<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>__APP_NAME__ — Architecture &amp; Codepaths</title>
    <style>
      :root {
        --bg: #0b0f1a;
        --bg-2: #131a2b;
        --fg: #e5e7eb;
        --fg-dim: #6b7280;
        --line: #1f2937;
        --lit: #facc15;
        --dim-opacity: 0.18;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 13px;
        height: 100%;
      }
      header {
        padding: 18px 24px 6px;
        border-bottom: 1px solid var(--line);
      }
      header h1 {
        margin: 0 0 2px;
        font-size: 16px;
        font-weight: 600;
      }
      header .subtitle {
        color: var(--fg-dim);
        font-size: 12px;
      }
      .legend {
        display: flex;
        gap: 14px;
        padding: 6px 24px 12px;
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
      }
      .legend .item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--fg-dim);
      }
      .legend .dot {
        width: 8px;
        height: 8px;
        border-radius: 2px;
      }
      .main {
        display: grid;
        grid-template-columns: 1fr 320px;
        height: calc(100% - 88px);
      }
      .graph {
        position: relative;
        overflow: auto;
        padding: 16px;
      }
      .columns {
        display: grid;
        gap: 12px;
        min-width: 100%;
        min-height: 100%;
      }
      .column {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .column h3 {
        margin: 0 0 4px;
        font-size: 10px;
        text-transform: uppercase;
        color: var(--fg-dim);
        letter-spacing: 0.06em;
        font-weight: 600;
      }
      .node {
        background: var(--bg-2);
        border: 1px solid var(--line);
        border-left-width: 3px;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 12px;
        transition: opacity 150ms;
      }
      .node.lit {
        border-color: var(--lit);
        background: rgba(250, 204, 21, 0.08);
      }
      .node.dim {
        opacity: var(--dim-opacity);
      }
      svg.edges {
        position: absolute;
        left: 0;
        top: 0;
        pointer-events: none;
      }
      svg.edges path {
        stroke: var(--fg-dim);
        stroke-width: 1;
        fill: none;
        opacity: 0.4;
        transition:
          opacity 150ms,
          stroke 150ms;
      }
      svg.edges path.lit {
        stroke: var(--lit);
        opacity: 1;
        stroke-width: 1.5;
      }
      svg.edges path.dim {
        opacity: var(--dim-opacity);
      }
      aside {
        display: grid;
        grid-template-rows: 1fr 1fr;
        border-left: 1px solid var(--line);
      }
      .panel {
        overflow: auto;
        padding: 12px 16px;
      }
      .panel + .panel {
        border-top: 1px solid var(--line);
      }
      .panel h2 {
        margin: 0 0 8px;
        font-size: 10px;
        text-transform: uppercase;
        color: var(--fg-dim);
        letter-spacing: 0.08em;
        font-weight: 600;
      }
      .cp-card {
        width: 100%;
        text-align: left;
        cursor: pointer;
        background: var(--bg-2);
        color: var(--fg);
        border: 1px solid var(--line);
        padding: 8px 10px;
        border-radius: 4px;
        margin-bottom: 6px;
        transition:
          background 150ms,
          border-color 150ms;
      }
      .cp-card:hover {
        background: #1c2540;
      }
      .cp-card.active {
        border-color: var(--lit);
        background: rgba(250, 204, 21, 0.08);
      }
      .cp-card .name {
        font-weight: 600;
        font-size: 12px;
      }
      .cp-card .desc {
        font-size: 11px;
        color: var(--fg-dim);
        margin-top: 2px;
        line-height: 1.4;
      }
      .cp-card .send {
        margin-top: 6px;
        font-size: 10px;
        padding: 3px 8px;
        background: var(--lit);
        color: #0b0f1a;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
      }
      .step {
        background: var(--bg-2);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 8px 10px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .step .head {
        display: flex;
        gap: 6px;
        align-items: baseline;
      }
      .step .num {
        color: var(--fg-dim);
        font-size: 11px;
        min-width: 18px;
      }
      .step .arrow {
        color: var(--fg-dim);
      }
      .step .annotation {
        margin-top: 4px;
        color: var(--fg);
      }
      .step .payload {
        font-family: ui-monospace, monospace;
        font-size: 11px;
        color: var(--fg-dim);
        margin-top: 2px;
      }
      .step .ref a {
        color: var(--lit);
        text-decoration: none;
        font-size: 11px;
      }
      .empty {
        color: var(--fg-dim);
        font-style: italic;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="app-title">__APP_NAME__ — Architecture &amp; Codepaths</h1>
      <div class="subtitle" id="app-subtitle">__APP_SUBTITLE__</div>
    </header>
    <div class="legend" id="legend"></div>
    <div class="main">
      <div class="graph">
        <div class="columns" id="columns"></div>
        <svg class="edges" id="edges"></svg>
      </div>
      <aside>
        <div class="panel">
          <h2>Codepaths</h2>
          <div id="codepaths"></div>
        </div>
        <div class="panel">
          <h2>Steps</h2>
          <div id="steps">
            <div class="empty">Click a codepath to see its steps.</div>
          </div>
        </div>
      </aside>
    </div>

    <script type="application/json" id="data">
      __DATA__
    </script>
    <script>
      (function () {
        const data = JSON.parse(document.getElementById("data").textContent);
        const arch = data.architecture;
        const cps = data.codepaths.codepaths;
        const isSelectMode =
          new URLSearchParams(window.location.search).get("select") === "true";
        const selectPort = new URLSearchParams(window.location.search).get(
          "port",
        );

        document.getElementById("app-title").textContent =
          arch.app.name + " — Architecture & Codepaths";
        document.getElementById("app-subtitle").textContent =
          arch.app.subtitle || "";

        // Legend
        const legendEl = document.getElementById("legend");
        for (const c of [...arch.categories].sort(
          (a, b) => a.column - b.column,
        )) {
          const item = document.createElement("span");
          item.className = "item";
          item.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.label}`;
          legendEl.appendChild(item);
        }

        // Columns + components
        const columnsEl = document.getElementById("columns");
        const sortedCats = [...arch.categories].sort(
          (a, b) => a.column - b.column,
        );
        columnsEl.style.gridTemplateColumns = `repeat(${sortedCats.length}, minmax(140px, 1fr))`;
        const nodeEls = {}; // id -> DOM node
        for (const cat of sortedCats) {
          const col = document.createElement("div");
          col.className = "column";
          col.dataset.category = cat.id;
          const heading = document.createElement("h3");
          heading.textContent = cat.label;
          heading.style.color = cat.color;
          col.appendChild(heading);
          const comps = arch.components.filter((c) => c.category === cat.id);
          for (const comp of comps) {
            const node = document.createElement("div");
            node.className = "node";
            node.style.borderLeftColor = cat.color;
            node.dataset.id = comp.id;
            node.textContent = comp.label;
            col.appendChild(node);
            nodeEls[comp.id] = node;
          }
          columnsEl.appendChild(col);
        }

        // Edges (drawn after layout)
        const svg = document.getElementById("edges");
        const edgePaths = {}; // "from->to" -> path

        function drawEdges() {
          const graphRect = document
            .querySelector(".graph")
            .getBoundingClientRect();
          svg.setAttribute("width", graphRect.width);
          svg.setAttribute("height", graphRect.height);
          svg.innerHTML = "";
          for (const e of arch.edges) {
            const a = nodeEls[e.from],
              b = nodeEls[e.to];
            if (!a || !b) continue;
            const ar = a.getBoundingClientRect(),
              br = b.getBoundingClientRect();
            const x1 = ar.right - graphRect.left,
              y1 = ar.top + ar.height / 2 - graphRect.top;
            const x2 = br.left - graphRect.left,
              y2 = br.top + br.height / 2 - graphRect.top;
            const cx = (x1 + x2) / 2;
            const path = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "path",
            );
            path.setAttribute(
              "d",
              `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`,
            );
            svg.appendChild(path);
            edgePaths[`${e.from}->${e.to}`] = path;
          }
        }
        drawEdges();
        window.addEventListener("resize", drawEdges);

        // Codepaths panel
        const cpListEl = document.getElementById("codepaths");
        const cpCards = {};
        for (const cp of cps) {
          const card = document.createElement("button");
          card.className = "cp-card";
          card.dataset.id = cp.id;
          card.innerHTML = `<div class="name"></div><div class="desc"></div>`;
          card.querySelector(".name").textContent = cp.name;
          card.querySelector(".desc").textContent = cp.description || "";
          if (isSelectMode) {
            const send = document.createElement("button");
            send.className = "send";
            send.textContent = "Send to agent →";
            send.onclick = (ev) => {
              ev.stopPropagation();
              sendSelection(cp.id);
            };
            card.appendChild(send);
          }
          card.onclick = () => selectCodepath(cp.id);
          cpListEl.appendChild(card);
          cpCards[cp.id] = card;
        }

        // Step rendering + highlight
        const stepsEl = document.getElementById("steps");

        function selectCodepath(id) {
          window.location.hash = "codepath=" + id;
          const cp = cps.find((c) => c.id === id);
          if (!cp) return;
          Object.values(cpCards).forEach((el) => el.classList.remove("active"));
          cpCards[id].classList.add("active");

          const litComps = new Set();
          const litEdges = new Set();
          for (const s of cp.steps) {
            litComps.add(s.from);
            litComps.add(s.to);
            litEdges.add(`${s.from}->${s.to}`);
          }
          for (const [cid, el] of Object.entries(nodeEls)) {
            el.classList.toggle("lit", litComps.has(cid));
            el.classList.toggle("dim", !litComps.has(cid));
          }
          for (const [key, path] of Object.entries(edgePaths)) {
            path.classList.toggle("lit", litEdges.has(key));
            path.classList.toggle("dim", !litEdges.has(key));
          }

          stepsEl.innerHTML = "";
          cp.steps.forEach((s, i) => {
            const step = document.createElement("div");
            step.className = "step";
            const refHtml = s.ref
              ? `<div class="ref"><a href="vscode://file/${encodeURIComponent(s.ref)}">${s.ref}</a></div>`
              : "";
            const payloadHtml = s.payload
              ? `<div class="payload">${escapeHtml(s.payload)}</div>`
              : "";
            step.innerHTML = `
        <div class="head"><span class="num">${i + 1}.</span><span><b></b><span class="arrow"> → </span><b></b></span></div>
        <div class="annotation"></div>
        ${payloadHtml}
        ${refHtml}
      `;
            const bolds = step.querySelectorAll("b");
            bolds[0].textContent = s.from;
            bolds[1].textContent = s.to;
            step.querySelector(".annotation").textContent = s.annotation;
            stepsEl.appendChild(step);
          });
        }

        function escapeHtml(s) {
          return s.replace(
            /[&<>"']/g,
            (c) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
              })[c],
          );
        }

        async function sendSelection(id) {
          if (!selectPort) {
            alert("Not in select mode");
            return;
          }
          try {
            const r = await fetch(`http://127.0.0.1:${selectPort}/pick`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id }),
            });
            if (r.ok)
              document.body.innerHTML = `<div style="padding:32px;color:var(--lit);font-size:14px">Sent ${id} to agent. You can close this window.</div>`;
          } catch (e) {
            alert("Failed to send: " + e);
          }
        }

        // Restore selection from hash on load
        const m = window.location.hash.match(/codepath=([a-z0-9-]+)/);
        if (m && cps.find((c) => c.id === m[1])) selectCodepath(m[1]);
      })();
    </script>
  </body>
</html>
